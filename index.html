    async function carregarRankingPanesDashboard(tipo, containerId) {
      const config = window.elementSdk?.config || defaultConfig;
      const fontSize = config.font_size || defaultConfig.font_size;
      const bgColor = config.background_color || defaultConfig.background_color;
      const primaryColor = config.primary_action || defaultConfig.primary_action;
      const secondaryColor = config.secondary_action || defaultConfig.secondary_action;
      const container = document.getElementById(containerId);

      if (!container) return;

      try {
        const response = await fetch(`${RENDER_API_BASE}/ranking-panes?tipo=${encodeURIComponent(tipo)}&limit=10`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const ranking = await response.json();

        if (!Array.isArray(ranking) || ranking.length === 0) {
          container.innerHTML = `<p style="font-size: ${fontSize}px; opacity: 0.7;">Nenhuma pane aberta encontrada para este grupo.</p>`;
          return;
        }

        container.innerHTML = ranking.map((item, index) => `
          <div class="rounded p-4 cursor-pointer dashboard-pane-ranking-item" data-id="${item.id}" style="background-color: ${bgColor}; border-left: 4px solid ${index === 0 ? '#ef4444' : primaryColor};">
            <div class="flex items-start justify-between gap-3">
              <div style="min-width: 0; flex: 1;">
                <p class="font-bold" style="font-size: ${fontSize * 0.98}px; margin-bottom: 6px;">${index + 1}. ${item.prefixo || 'Sem prefixo'} • ATA ${item.ata || 'N/I'}</p>
                <p style="font-size: ${fontSize * 0.9}px; opacity: 0.92; line-height: 1.4; word-break: break-word;">${item.descricao || 'Sem descrição'}</p>
                <div class="flex gap-2 flex-wrap" style="margin-top: 8px;">
                  <span class="px-2 py-1 rounded" style="background-color: ${secondaryColor}; color: white; font-size: ${fontSize * 0.78}px;">${item.status || 'Sem status'}</span>
                  <span class="px-2 py-1 rounded" style="background-color: rgba(239,68,68,0.16); color: #fecaca; font-size: ${fontSize * 0.78}px;">${item.diasEmAberto} dia${item.diasEmAberto === 1 ? '' : 's'}</span>
                </div>
              </div>
              <div class="text-right" style="flex-shrink: 0; min-width: 82px;">
                <p class="font-bold" style="font-size: ${fontSize * 1.05}px; color: #fca5a5;">${item.horasEmAberto}h</p>
                <p style="font-size: ${fontSize * 0.75}px; opacity: 0.7;">em aberto</p>
              </div>
            </div>
          </div>
        `).join('');

        container.querySelectorAll('.dashboard-pane-ranking-item').forEach(itemEl => {
          itemEl.addEventListener('click', () => {
            const paneId = itemEl.dataset.id;
            selectedPane = currentData.find(d => d.type === 'pane' && d.id === paneId) || null;
            if (selectedPane) {
              previousView = 'dashboard';
              selectedAeronave = currentData.find(d => d.type === 'aeronave' && d.id === selectedPane.aeronaveId) || null;
              currentView = 'pane';
              renderCurrentView();
            }
          });
        });
      } catch (error) {
        console.error('Erro ao carregar ranking de panes:', error);
        container.innerHTML = `<p style="font-size: ${fontSize}px; color: #fca5a5;">Erro ao carregar ranking.</p>`;
      }
    }


    function setupDashboardListeners() {
      const backBtn = document.getElementById('dashboardBackBtn');
      if (backBtn) {
        backBtn.addEventListener('click', () => {
          currentView = 'home';
          renderCurrentView();
        });
      }

      const periodFilter = document.getElementById('dashboardPeriodFilter');
      if (periodFilter) {
        periodFilter.addEventListener('change', () => {
          dashboardPeriod = periodFilter.value;
          renderCurrentView();
        });
      }

      document.querySelectorAll('.dashboard-aeronave-item').forEach(item => {
        item.addEventListener('click', () => {
          const aeronaveId = item.dataset.id;
          selectedAeronave = currentData.find(d => d.type === 'aeronave' && d.id === aeronaveId) || null;
          if (selectedAeronave) {
            currentTab = 'lancadas';
            currentView = 'aeronave';
            renderCurrentView();
          }
        });
      });

      const config = window.elementSdk?.config || defaultConfig;
      const textColor = config.text_color || defaultConfig.text_color;
      const primaryColor = config.primary_action || defaultConfig.primary_action;
      const panes = currentData.filter(d => d.type === 'pane');
      const pendencias = currentData.filter(d => d.type === 'pendencia');
      const aeronaves = currentData.filter(d => d.type === 'aeronave');
      const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#84cc16', '#f97316', '#ec4899', '#14b8a6'];

      const now = new Date();
      const startDate = new Date(now);
      if (dashboardPeriod === '7d') {
        startDate.setDate(now.getDate() - 7);
      } else if (dashboardPeriod === '30d') {
        startDate.setDate(now.getDate() - 30);
      }

      const isWithinPeriod = (dateValue) => {
        if (dashboardPeriod === 'all') return true;
        if (!dateValue) return false;
        const date = new Date(dateValue);
        if (isNaN(date.getTime())) return false;
        return date >= startDate;
      };

      const panesFiltradas = panes.filter(p => isWithinPeriod(p.criadoEm));
      const paneIdsFiltradas = new Set(panesFiltradas.map(p => p.id));
      const pendenciasFiltradas = pendencias.filter(p => paneIdsFiltradas.has(p.paneId) || isWithinPeriod(p.criadoEm));

      const ataChartCanvas = document.getElementById('dashboardAtaChart');
      if (ataChartCanvas) {
        const counts = {};
        panesFiltradas.forEach(p => {
          const ata = (p.paneAta || 'N/I').toString().padStart(2, '0');
          counts[ata] = (counts[ata] || 0) + 1;
        });

        const sortedAta = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const labels = sortedAta.map(([ata]) => `ATA ${ata}`);
        const data = sortedAta.map(([, total]) => total);
        const totalAta = data.reduce((sum, value) => sum + value, 0);

        new Chart(ataChartCanvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: labels.map((_, index) => colors[index % colors.length]),
              borderColor: '#1e293b',
              borderWidth: 2,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const value = context.parsed.y || 0;
                    const pct = totalAta > 0 ? ((value / totalAta) * 100).toFixed(1) : '0.0';
                    return `${value} pane${value !== 1 ? 's' : ''} (${pct}%)`;
                  }
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: textColor, precision: 0 },
                grid: { color: 'rgba(241,245,249,0.12)' }
              },
              x: {
                ticks: { color: textColor },
                grid: { display: false }
              }
            }
          }
        });
      }

      const aeronaveChartCanvas = document.getElementById('dashboardAeronaveChart');
      if (aeronaveChartCanvas) {
        const sortedAeronaves = aeronaves.map(a => ({
          id: a.id,
          prefixo: a.prefixo,
          total: panesFiltradas.filter(p => p.aeronaveId === a.id).length
        })).filter(item => item.total > 0).sort((a, b) => b.total - a.total || a.prefixo.localeCompare(b.prefixo)).slice(0, 10);

        new Chart(aeronaveChartCanvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels: sortedAeronaves.map(item => item.prefixo),
            datasets: [{
              label: 'Panes',
              data: sortedAeronaves.map(item => item.total),
              backgroundColor: primaryColor,
              borderColor: '#1e293b',
              borderWidth: 2,
              borderRadius: 6
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    const value = context.parsed.x || 0;
                    return `${value} pane${value !== 1 ? 's' : ''}`;
                  }
                }
              }
            },
            scales: {
              x: {
                beginAtZero: true,
                ticks: { color: textColor, precision: 0 },
                grid: { color: 'rgba(241,245,249,0.12)' }
              },
              y: {
                ticks: { color: textColor },
                grid: { display: false }
              }
            },
            onClick: (event, activeElements) => {
              if (!activeElements.length) return;
              const index = activeElements[0].index;
              const aeronaveId = sortedAeronaves[index]?.id;
              selectedAeronave = currentData.find(d => d.type === 'aeronave' && d.id === aeronaveId) || null;
              if (selectedAeronave) {
                currentTab = 'lancadas';
                currentView = 'aeronave';
                renderCurrentView();
              }
            }
          }
        });
      }

      const statusChartCanvas = document.getElementById('dashboardStatusChart');
      if (statusChartCanvas) {
        const statusLabels = ['Lançadas', 'Em progresso', 'Aguard. material', 'Aguard. transf.', 'Finalizadas'];
        const statusData = [
          panesFiltradas.filter(p => p.paneStatus === 'lancada').length,
          panesFiltradas.filter(p => p.paneStatus === 'em_progresso').length,
          panesFiltradas.filter(p => p.paneStatus === 'aguardando_material').length,
          panesFiltradas.filter(p => p.paneStatus === 'aguardando_transferencia').length,
          panesFiltradas.filter(p => p.paneStatus === 'finalizada').length
        ];

        new Chart(statusChartCanvas.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: statusLabels,
            datasets: [{
              data: statusData,
              backgroundColor: ['#f59e0b', '#3b82f6', '#22c55e', '#8b5cf6', '#64748b'],
              borderColor: '#1e293b',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { color: textColor, padding: 14, font: { size: 11 } }
              }
            }
          }
        });
      }

      const pendenciaChartCanvas = document.getElementById('dashboardPendenciaChart');
      if (pendenciaChartCanvas) {
        const pendenciaLabels = ['Compra', 'Transferência', 'Ferramenta', 'Material'];
        const pendenciaData = [
          pendenciasFiltradas.filter(p => p.tipoAquisicao === 'compra').length,
          pendenciasFiltradas.filter(p => p.tipoAquisicao === 'transferencia').length,
          pendenciasFiltradas.filter(p => p.tipoItem === 'ferramenta').length,
          pendenciasFiltradas.filter(p => p.tipoItem === 'material').length
        ];

        new Chart(pendenciaChartCanvas.getContext('2d'), {
          type: 'bar',
          data: {
            labels: pendenciaLabels,
            datasets: [{
              data: pendenciaData,
              backgroundColor: ['#06b6d4', '#8b5cf6', '#f59e0b', '#22c55e'],
              borderColor: '#1e293b',
              borderWidth: 2,
              borderRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: textColor, precision: 0 },
                grid: { color: 'rgba(241,245,249,0.12)' }
              },
              x: {
                ticks: { color: textColor },
                grid: { display: false }
              }
            }
          }
        });
      }

      const trendChartCanvas = document.getElementById('dashboardTrendChart');
      if (trendChartCanvas) {
        const panesMensaisMap = {};
        panes.forEach(p => {
          if (!p.criadoEm) return;
          const date = new Date(p.criadoEm);
          if (isNaN(date.getTime())) return;
          const key = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
          panesMensaisMap[key] = (panesMensaisMap[key] || 0) + 1;
        });

        const panesMensais = Object.entries(panesMensaisMap)
          .sort((a, b) => a[0].localeCompare(b[0]))
          .slice(-6)
          .map(([mes, total]) => ({
            mes: new Date(`${mes}-01T00:00:00`).toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' }),
            total
          }));

        new Chart(trendChartCanvas.getContext('2d'), {
          type: 'line',
          data: {
            labels: panesMensais.map(item => item.mes),
            datasets: [{
              label: 'Panes',
              data: panesMensais.map(item => item.total),
              borderColor: '#f59e0b',
              backgroundColor: 'rgba(245,158,11,0.15)',
              tension: 0.35,
              fill: true,
              pointRadius: 4,
              pointHoverRadius: 5
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { color: textColor }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { color: textColor, precision: 0 },
                grid: { color: 'rgba(241,245,249,0.12)' }
              },
              x: {
                ticks: { color: textColor },
                grid: { display: false }
              }
            }
          }
        });
      }

      carregarRankingPanesDashboard('avionico', 'rankingAviContainer');
      carregarRankingPanesDashboard('mecanico', 'rankingMecContainer');
    }


    function setupAeronaveListeners() {
      const backBtn = document.getElementById('backBtn');
      if (backBtn) {
        backBtn.addEventListener('click', () => {
          currentView = 'home';
          selectedAeronave = null;
          renderCurrentView();
        });
      }

      const panes = currentData.filter(d => d.type === 'pane' && d.aeronaveId === selectedAeronave.id);
      
      if (panes.length > 0) {
        const ataCount = {};
        panes.forEach(pane => {
          ataCount[pane.paneAta] = (ataCount[pane.paneAta] || 0) + 1;
        });

        const ataLabels = Object.keys(ataCount).sort((a, b) => a.localeCompare(b));
        const ataData = ataLabels.map(ata => ataCount[ata]);
        
        const colors = [
          '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6',
          '#ec4899', '#14b8a6', '#f97316', '#6366f1', '#84cc16',
          '#06b6d4', '#eab308', '#a855f7', '#22c55e', '#f43f5e'
        ];

        const canvas = document.getElementById('ataChart');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          new Chart(ctx, {
            type: 'pie',
            data: {
              labels: ataLabels.map(ata => `ATA ${ata}`),
              datasets: [{
                data: ataData,
                backgroundColor: colors.slice(0, ataLabels.length),
                borderWidth: 2,
                borderColor: '#1e293b'
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: {
                legend: {
                  position: 'bottom',
                  labels: {
                    color: '#f1f5f9',
                    padding: 15,
                    font: {
                      size: 12
                    }
                  }
                },
                tooltip: {
                  callbacks: {
                    label: function(context) {
                      const label = context.label || '';
                      const value = context.parsed || 0;
                      const total = context.dataset.data.reduce((a, b) => a + b, 0);
                      const percentage = ((value / total) * 100).toFixed(1);
                      return `${label}: ${value} pane${value !== 1 ? 's' : ''} (${percentage}%)`;
                    }
                  }
                }
              },
              onClick: (event, activeElements) => {
                if (activeElements.length > 0) {
                  const index = activeElements[0].index;
                  const ata = ataLabels[index];
                  selectedAta = ata;
                  currentView = 'ata';
                  renderCurrentView();
                }
              }
            }
          });
        }
      }

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTab = btn.dataset.tab;
          renderCurrentView();
        });
      });

      const addPaneBtn = document.getElementById('addPaneBtn');
      const modal = document.getElementById('addPaneModal');
      const cancelBtn = document.getElementById('cancelPaneBtn');
      const form = document.getElementById('paneForm');

      if (addPaneBtn && modal) {
        addPaneBtn.addEventListener('click', () => {
          modal.classList.remove('hidden');
          modal.classList.add('flex');
        });
      }

      if (cancelBtn && modal) {
        cancelBtn.addEventListener('click', () => {
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          form?.reset();
        });
      }

      if (form) {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          if (currentData.length >= 999) {
            showToast('Limite de 999 registros atingido', 'error');
            return;
          }

          const paneDescricao = document.getElementById('paneDescricao').value;
          const paneAta = document.getElementById('paneAta').value.padStart(2, '0');
          const paneTipo = document.querySelector('input[name="paneTipo"]:checked')?.value;
          const paneResponsavel = document.getElementById('paneResponsavel').value;
          const paneFotoUrl = document.getElementById('paneFotoUrl').value.trim();

          const result = await window.dataSdk.create({
            id: Date.now().toString(),
            type: 'pane',
            aeronaveId: selectedAeronave.id,
            paneDescricao,
            paneAta,
            paneTipo,
            paneResponsavel,
            paneFotoUrl: paneFotoUrl || null,
            paneStatus: 'lancada',
            criadoEm: new Date().toISOString(),
            criadoPor: currentUser.username
          });

          if (result.isOk) {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            form.reset();
            showToast('Pane adicionada com sucesso!', 'success');
          } else {
            showToast('Erro ao adicionar pane', 'error');
          }
        });
      }

      document.querySelectorAll('.pane-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = card.dataset.id;
          selectedPane = currentData.find(d => d.id === id);
          currentView = 'pane';
          renderCurrentView();
        });
      });
    }
